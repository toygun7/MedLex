<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🧠 MedLex Quiz</title>

    <link rel="icon" type="image/png" href="medlexlogo.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">

    <img src="medlexlogo.png" alt="MedLex Logo" class="logo">

    <div>

        <h1>MedLex Quiz</h1>

        <p class="subtitle">Test Your Medical English</p>

    </div>

</header>

    <main>

    <div class="category-box">

        <label for="quizCategory">📂 Kategori</label>

        <select id="quizCategory" onchange="showCategoryCount()">

            <option value="all">📚 Tümü</option>
            <option value="favorites">⭐ Favoriler</option>
            <option value="general">🩺 Genel Tıp</option>
            <option value="anatomy">🦴 Anatomi</option>
            <option value="diseases">🦠 Hastalıklar</option>
            <option value="verbs">💉 Tıbbi Fiiller</option>

        </select>

    </div>

    <div class="info-box">

        <p id="categoryCount"></p>

    </div>

    <div class="button-group">

        <button onclick="newQuiz()">▶ Quiz Başlat</button>

        <button onclick="changeMode()">🔄 Mod Değiştir</button>

        <button onclick="location.href='index.html'">🏠 Ana Sayfa</button>

    </div>

    <div class="card">

        <h2 id="question">Quiz başlatmak için butona basın</h2>

        <p id="quizStatus"></p>

        <button id="option1" onclick="checkAnswer(this)">Seçenek 1</button>

        <button id="option2" onclick="checkAnswer(this)">Seçenek 2</button>

        <button id="option3" onclick="checkAnswer(this)">Seçenek 3</button>

        <button id="option4" onclick="checkAnswer(this)">Seçenek 4</button>

        <div class="score-box">

    <h3 id="score">🏆 Puan: 0</h3>

</div>

        <div id="quizResult"></div>

    </div>
    
    </main>
     <div id="toast"></div>

    <script src="anatomy.js"></script>
    <script src="diseases.js"></script>
    <script src="verbs.js"></script>
    <script src="general.js"></script>
    <script src="words.js"></script>
    <script src="utils.js"></script>
    <script src="quiz.js"></script>

</body>

</html>
