<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLex | Medical English</title>
    <link rel="icon" type="image/png" href="medlexlogo.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

    <img src="medlexlogo.png" alt="MedLex Logo" class="logo">

    <div>

        <h1>MedLex</h1>

        <p class="subtitle">
            Medical English Flashcards
        </p>

    </div>

</header>

<main>

<input
    type="text"
    id="search"
    autocomplete="off"
    placeholder="Kelime ara..."
    onkeyup="searchWord()"
>
<div class="category-box">

    <label>📂 Kategori</label>

    <div class="dropdown">

        <button
            id="dropdownButton"
            class="dropdown-button"
            onclick="toggleDropdown()">

            📚 Tümü ▼

        </button>

        <div id="dropdownMenu" class="dropdown-menu">

            <div onclick="selectCategory('all','📚 Tümü')">
                📚 Tümü
            </div>

            <div onclick="selectCategory('favorites','⭐ Favoriler')">
                ⭐ Favoriler
            </div>

            <div onclick="selectCategory('general','🩺 Genel Tıp')">
                🩺 Genel Tıp
            </div>

            <div onclick="selectCategory('anatomy','🦴 Anatomi')">
                🦴 Anatomi
            </div>

            <div onclick="selectCategory('diseases','🦠 Hastalıklar')">
                🦠 Hastalıklar
            </div>

            <div onclick="selectCategory('verbs','💉 Tıbbi Fiiller')">
                💉 Tıbbi Fiiller
            </div>

        </div>

    </div>

</div>
  
   <div class="card">

    <h2 id="english">Diagnose</h2>

    <p>
        <b id="translationTitle">Türkçesi:</b>
    </p>

    <p id="turkish">Teşhis koymak</p>

    <p>
        <b>Örnek:</b>
    </p>

    <p id="example">
        The doctor diagnosed pneumonia.
    </p>

</div>

<div class="button-group">

    <button onclick="previousWord()">⬅ Önceki</button>

    <button onclick="flipCard()">🔄 Çevir</button>

    <button onclick="randomWord()">🎲 Rastgele</button>

    <button onclick="nextWord()">Sonraki ➜</button>

    <button id="favoriteButton" onclick="addFavorite()">
        ⭐ Favorilere Ekle
    </button>

</div>

<div class="info-box">

    <h3>⭐ Favori Sayısı: <span id="favoriteCount">0</span></h3>

    <h3>📚 Toplam Kelime: <span id="wordCount">0</span></h3>

</div>

</main>

<div id="toast"></div>

<script src="anatomy.js"></script>
<script src="diseases.js"></script>
<script src="verbs.js"></script>
<script src="general.js"></script>
<script src="words.js"></script>
<script src="utils.js"></script>
<script src="script.js"></script>


</body>
</html>
